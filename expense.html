<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trip Ledger">
  <title>New Expense • Trip Ledger • PrismJet</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell form-page">
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <header class="form-shell card">
      <a class="inline-button back-link" id="back-link" href="index.html?view=to-submit">Back</a>
      <div class="form-header">
        <div>
          <div class="brand-lockup brand-lockup-compact">
            <div class="brand-logo-frame">
              <img class="brand-logo" src="assets/prismjet-logo.svg" alt="PrismJet">
            </div>
          </div>
          <p class="eyebrow" id="form-eyebrow">PrismJet expense entry</p>
          <h1 id="form-title">New Expense</h1>
          <p class="back-copy" id="form-copy">Snap the receipt, let OCR suggest the basics, then save.</p>
        </div>
      </div>
    </header>

    <section class="card form-card">
      <form id="expense-form" novalidate>
        <input id="expense-id" type="hidden">
        <input id="existing-photo" type="hidden">
        <datalist id="trip-number-options"></datalist>

        <fieldset class="entry-type-picker">
          <legend>Entry type</legend>
          <label class="entry-type-option">
            <input id="record-type-expense" name="recordType" type="radio" value="expense" checked>
            <span>Expense</span>
          </label>
          <label class="entry-type-option">
            <input id="record-type-incentive" name="recordType" type="radio" value="incentive">
            <span>Incentive</span>
          </label>
        </fieldset>

        <div class="field-grid entry-grid">
          <label class="field field-wide receipt-field">
            <span>Receipt photo</span>
            <input id="photo" name="photo" type="file" accept="image/*">
            <div class="receipt-actions">
              <button class="secondary-button compact-action" id="autofill-button" type="button" disabled>Auto-Fill from Receipt</button>
              <p class="scan-status" id="scan-status">Choose a receipt photo to scan amount, vendor, category, and date.</p>
            </div>
            <small class="field-help">This OCR runs in the browser, so there is no API charge. It prefers the final total when a tip line is present and works best with a clear, straight-on receipt photo.</small>
          </label>

          <label class="field">
            <span>Amount</span>
            <input id="amount" name="amount" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" required>
          </label>

          <label class="field">
            <span>Expense date</span>
            <input id="date" name="date" type="date" required>
          </label>

          <label class="field field-wide">
            <span>Vendor</span>
            <input id="merchant" name="merchant" type="text" maxlength="80" placeholder="Restaurant, hotel, airline, rideshare" required>
          </label>

          <label class="field">
            <span>Category</span>
            <select id="category" name="category" required>
              <option value="">Select category</option>
              <option value="Lodging">Lodging</option>
              <option value="Meal">Meal</option>
              <option value="Flight">Flight</option>
              <option value="Transport">Transport</option>
              <option value="Supplies">Supplies</option>
              <option value="Miscellaneous">Miscellaneous</option>
            </select>
          </label>

          <label class="field">
            <span>Trip #</span>
            <input id="trip-number" name="tripNumber" type="text" maxlength="40" placeholder="12345 or PHX-0426" list="trip-number-options">
          </label>
        </div>

        <div class="photo-preview" id="photo-preview" hidden>
          <div class="photo-preview-actions">
            <button class="secondary-button compact-action" id="open-preview-button" type="button">Open Large Preview</button>
            <button class="inline-button danger-inline" id="remove-photo-button" type="button">Remove photo</button>
          </div>
          <img id="photo-preview-image" alt="Receipt preview">
        </div>

        <details class="details-panel" id="optional-details">
          <summary>More details</summary>
          <div class="field-grid optional-grid">
            <label class="field field-wide">
              <span>Location</span>
              <div class="location-row">
                <input id="location" name="location" type="text" maxlength="120" placeholder="Phoenix Sky Harbor, client site, hotel lobby">
                <button class="inline-button" id="use-location-button" type="button">Use GPS</button>
              </div>
            </label>

            <label class="field field-wide">
              <span>Notes</span>
              <textarea id="notes" name="notes" rows="3" maxlength="400" placeholder="Who it was for, project code, anything your reimbursement process needs"></textarea>
            </label>

            <label class="field">
              <span>Date submitted</span>
              <input id="submitted-date" name="submittedDate" type="date">
            </label>

            <label class="field">
              <span>Date reimbursed</span>
              <input id="reimbursed-date" name="reimbursedDate" type="date">
            </label>
          </div>
        </details>

        <div class="form-actions">
          <button class="primary-button" id="save-button" type="submit">Save Expense</button>
          <a class="secondary-button" id="cancel-link" href="index.html?view=to-submit">Cancel</a>
        </div>
      </form>
    </section>
  </div>

  <div class="image-modal" id="image-modal" hidden>
    <div class="image-modal-scrim" id="image-modal-scrim"></div>
    <div class="image-modal-card">
      <div class="image-modal-toolbar">
        <button class="inline-button" id="close-preview-button" type="button">Done</button>
        <div class="image-zoom-actions">
          <button class="inline-button" id="zoom-out-button" type="button">-</button>
          <button class="inline-button" id="zoom-reset-button" type="button">Reset</button>
          <button class="inline-button" id="zoom-in-button" type="button">+</button>
        </div>
      </div>
      <div class="image-modal-frame" id="image-modal-frame">
        <img id="image-modal-image" alt="Large receipt preview">
      </div>
      <p class="field-help image-modal-help">Zoom in, then drag to inspect the handwriting and totals.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js"></script>
  <script src="expense.js" type="module"></script>
</body>
</html>
