<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trip Ledger">
  <title>Export Report • Trip Ledger</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell form-page">
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <a class="back-link secondary-button" href="index.html">Back to dashboard</a>

    <header class="form-shell card">
      <div class="form-header">
        <div>
          <div class="brand-lockup brand-lockup-compact">
            <div class="brand-logo-frame">
              <img class="brand-logo" src="assets/prismjet-logo.svg" alt="PrismJet">
            </div>
          </div>
          <p class="eyebrow">Excel export</p>
          <h1>Export Report</h1>
          <p class="back-copy">Create a detailed Excel report for expenses and incentives in a selected date range.</p>
        </div>
      </div>
    </header>

    <main class="card form-card report-card">
      <div class="field-grid report-date-grid">
        <label class="field" for="report-start-date">
          <span>Start date</span>
          <input id="report-start-date" type="date" required>
        </label>

        <label class="field" for="report-end-date">
          <span>End date</span>
          <input id="report-end-date" type="date" required>
        </label>
      </div>

      <p class="report-preview" id="report-preview">Loading saved entries...</p>

      <div class="form-actions report-actions">
        <button class="primary-button" id="report-export-button" type="button">Export Excel Report</button>
        <a class="secondary-button report-download-link" id="report-download-link" href="#" download hidden>Open Excel File</a>
      </div>

      <p class="scan-status" id="report-status" aria-live="polite"></p>
    </main>
  </div>

  <script src="report.js" type="module"></script>
</body>
</html>
